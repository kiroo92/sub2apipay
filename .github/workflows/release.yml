name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      release_name: ${{ steps.vars.outputs.release_name }}
      image: ${{ steps.vars.outputs.image }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      publish_latest: ${{ steps.vars.outputs.publish_latest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="release-$(TZ=Asia/Shanghai date '+%Y%m%d-%H%M%S')"
            RELEASE_NAME="Release $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S CST')"
            PUBLISH_LATEST="true"
          else
            TAG="${GITHUB_REF_NAME}"
            RELEASE_NAME="Release $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S CST')"
            PUBLISH_LATEST="true"
          fi

          if [[ ! "$TAG" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?|release-[0-9]{8}-[0-9]{6})$ ]]; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Release tag already exists: $TAG"
            exit 1
          fi

          IMAGE="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="$(echo "$TAG" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="$(git rev-parse --short HEAD)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$PUBLISH_LATEST" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "${{ steps.vars.outputs.tag }}" | head -n 1 || true)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          {
            echo 'body<<EOF'
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${{ steps.vars.outputs.tag }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image_tags
        shell: bash
        run: |
          {
            echo 'tags<<EOF'
            echo "${{ needs.release.outputs.image }}:${{ needs.release.outputs.image_tag }}"
            echo "${{ needs.release.outputs.image }}:sha-${{ needs.release.outputs.short_sha }}"
            if [[ "${{ needs.release.outputs.publish_latest }}" == "true" ]]; then
              echo "${{ needs.release.outputs.image }}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
